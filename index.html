<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HD PDF Editor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family:  Arial, Helvetica, sans-serif;
  padding: 20px;
}

.toolbar {
  margin-bottom: 10px;
  background: #f3f3f3;
  padding: 10px;
  border-radius: 8px;
}

button, input {
  margin: 5px;
  padding: 5px;
}

canvas {
  border: 1px solid black;
}
</style>
</head>

<body>

<h2>HD PDF Editor</h2>

<div class="toolbar">
  <input type="file" id="pdfUpload">

  <button onclick="addText()">Add Text</button>
  <button onclick="makeBold()">Bold</button>
  <button onclick="makeItalic()">Italic</button>
  <input type="number" id="fontSize" placeholder="Font Size">

  <input type="file" id="imgUpload">

  <button onclick="increaseSize()">Image +</button>
  <button onclick="decreaseSize()">Image -</button>

  <button onclick="downloadPDF()">Download PDF</button>
  <button onclick="downloadImage()">Download Image</button>
</div>

<canvas id="canvas"></canvas>

<script>
// 🔥 High DPI setting
fabric.devicePixelRatio = 3;

const canvas = new fabric.Canvas('canvas');

/* ---------------- PDF Upload (HD Render) ---------------- */
document.getElementById('pdfUpload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function() {
    const typedarray = new Uint8Array(this.result);

    pdfjsLib.getDocument(typedarray).promise.then(pdf => {
      pdf.getPage(1).then(page => {

        const scale = 3; // 🔥 HIGH QUALITY
        const viewport = page.getViewport({ scale });

        const tempCanvas = document.createElement('canvas');
        const context = tempCanvas.getContext('2d');

        tempCanvas.width = viewport.width;
        tempCanvas.height = viewport.height;

        page.render({
          canvasContext: context,
          viewport: viewport
        }).promise.then(() => {

          const imgData = tempCanvas.toDataURL("image/png");

          fabric.Image.fromURL(imgData, function(img) {
            img.selectable = false;

            canvas.setWidth(img.width);
            canvas.setHeight(img.height);

            canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
          });

        });
      });
    });
  };

  reader.readAsArrayBuffer(file);
});

/* ---------------- Text ---------------- */
function addText() {
  const text = new fabric.IText("Edit me", {
    left: 100,
    top: 100,
    fontSize: 30,
    fontFamily: "Arial, Helvetica, sans-serif",
    // fontWeight:600
    
  });
  canvas.add(text);
}

function makeBold() {
  const obj = canvas.getActiveObject();
  if (obj) {
    obj.set("fontWeight", obj.fontWeight === "bold" ? "normal" : "bold");
    canvas.renderAll();
  }
}

function makeItalic() {
  const obj = canvas.getActiveObject();
  if (obj) {
    obj.set("fontStyle", obj.fontStyle === "italic" ? "normal" : "italic");
    canvas.renderAll();
  }
}

document.getElementById('fontSize').addEventListener('change', function() {
  const obj = canvas.getActiveObject();
  if (obj) {
    obj.set("fontSize", parseInt(this.value));
    canvas.renderAll();
  }
});

/* ---------------- Image Upload ---------------- */
document.getElementById('imgUpload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function() {
    fabric.Image.fromURL(this.result, function(img) {
      img.set({
        left: 100,
        top: 100,
        scaleX: 0.5,
        scaleY: 0.5
      });
      canvas.add(img);
    });
  };

  reader.readAsDataURL(file);
});

/* ---------------- Image Resize Buttons ---------------- */
function increaseSize() {
  const obj = canvas.getActiveObject();
  if (obj && obj.type === 'image') {
    obj.scaleX += 0.1;
    obj.scaleY += 0.1;
    canvas.renderAll();
  }
}

function decreaseSize() {
  const obj = canvas.getActiveObject();
  if (obj && obj.type === 'image') {
    obj.scaleX -= 0.1;
    obj.scaleY -= 0.1;
    canvas.renderAll();
  }
}

/* ---------------- Download PDF (HD) ---------------- */
function downloadPDF() {
  const { jsPDF } = window.jspdf;

  const imgData = canvas.toDataURL({
    format: "jpeg",
    quality: 0.8,
    multiplier: 2
  });

  const pdf = new jsPDF({
    orientation: "portrait",
    unit: "px",
    format: [canvas.width, canvas.height]
  });

  pdf.addImage(imgData, 'JPEG', 0, 0, canvas.width, canvas.height);
  pdf.save("edited.pdf");
}

/* ---------------- Download Image (HD) ---------------- */
function downloadImage() {
  const link = document.createElement("a");

  link.download = "image.png";
  link.href = canvas.toDataURL({
    format: "png",
    multiplier: 3 // 🔥 HD
  });

  link.click();
}
</script>

</body>
</html>
